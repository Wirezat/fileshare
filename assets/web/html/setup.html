<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fileshare — Setup</title>
    <style>
        :root {
            --text: #1a1a1a;
            --text-muted: #888;
            --border: #e0e0e0;
            --bg: #fff;
            --accent: #ffc107;
            --accent-dark: #e6a800;
            --accent-text: #3a2000;
            --danger: #c0392b;
            --success: #2e7d32;
            --radius: 6px;
        }
        html.dark {
            --text: #f0ede8;
            --text-muted: #888;
            --border: #2e2e2c;
            --bg: #141412;
            --accent: #e6a800;
            --accent-dark: #cc9600;
            --accent-text: #faeeda;
            --danger: #e57373;
            --success: #81c784;
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        main {
            width: 100%;
            max-width: 320px;
            padding: 0 16px;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }
        .fields {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .field label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }
        .field input {
            height: 36px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
            transition: border-color 0.15s;
            width: 100%;
        }
        .field input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap input {
            padding-right: 36px;
        }
        .toggle-pw {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            width: auto;
            height: auto;
            padding: 2px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            opacity: 0.6;
            transition: opacity 0.15s;
        }
        .toggle-pw:hover:not(:disabled) {
            background: none;
            opacity: 1;
        }
        button {
            width: 100%;
            height: 36px;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.12s;
        }
        button:hover:not(:disabled) {
            background: var(--accent-dark);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            min-height: 18px;
        }
        .status.err {
            color: var(--danger);
        }
        .status.ok {
            color: var(--success);
        }
        .theme-btn {
            position: fixed;
            top: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: border-color 0.15s, background 0.15s;
            padding: 0;
        }
        .theme-btn:hover:not(:disabled) {
            background: var(--border);
        }
    </style>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>
<body>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Theme wechseln">🌙</button>
    <main>
        <h1>Fileshare</h1>
        <p class="subtitle">Create your admin account to get started.</p>
        <div class="fields">
            <div class="field">
                <label for="f-username">Username</label>
                <input type="text" id="f-username" value="admin" autocomplete="username" spellcheck="false" />
            </div>
            <div class="field">
                <label for="f-password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="f-password" placeholder="••••••••" autocomplete="new-password" autofocus />
                    <button type="button" class="toggle-pw" onclick="togglePw('f-password', this)" tabindex="-1" aria-label="Passwort anzeigen">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="field">
                <label for="f-confirm">Confirm password</label>
                <div class="input-wrap">
                    <input type="password" id="f-confirm" placeholder="••••••••" autocomplete="new-password" />
                    <button type="button" class="toggle-pw" onclick="togglePw('f-confirm', this)" tabindex="-1" aria-label="Passwort anzeigen">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <button id="submit-btn" onclick="submitSetup()">Continue</button>
        <p class="status" id="status"></p>
    </main>
    <script>
        const EYE = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.innerHTML = show ? EYE_OFF : EYE;
            btn.setAttribute('aria-label', show ? 'Passwort verbergen' : 'Passwort anzeigen');
        }
                function updateThemeBtn() {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeBtn();
        }
        updateThemeBtn();
                function showStatus(msg, isErr) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + (isErr ? 'err' : 'ok');
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') submitSetup();
        });
        async function submitSetup() {
            const username = document.getElementById('f-username').value.trim();
            const password = document.getElementById('f-password').value;
            const confirm = document.getElementById('f-confirm').value;
            const btn = document.getElementById('submit-btn');
            if (!username) return showStatus('Username cannot be empty.', true);
            if (!password) return showStatus('Password cannot be empty.', true);
            if (password !== confirm) return showStatus('Passwords do not match.', true);
            btn.disabled = true;
            try {
                const res = await fetch('/setup/api/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_username: username, new_password: password }),
                });
                if (res.ok) {
                    showStatus('Redirecting…', false);
                    setTimeout(() => { window.location.href = '/admin'; }, 800);
                } else {
                    showStatus((await res.text()) || 'Something went wrong.', true);
                    btn.disabled = false;
                }
            } catch {
                showStatus('Request failed.', true);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
