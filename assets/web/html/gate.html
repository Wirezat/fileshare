{{define "gate"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Subpath}} — locked</title>
    <link rel="stylesheet" href="/static/share.css" />
    <style>
        .gate-wrap {
            display: flex;
            justify-content: center;
            padding: 80px 16px;
        }

        .gate-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px 28px;
            width: 100%;
            max-width: 340px;
        }

        .gate-icon {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .gate-title {
            font-family: var(--font-mono, monospace);
            font-size: 13px;
            color: var(--text);
            margin-bottom: 20px;
        }

        .gate-error {
            font-size: 12px;
            color: var(--danger, #e05555);
            background: rgba(224, 85, 85, 0.08);
            border: 1px solid rgba(224, 85, 85, 0.2);
            border-radius: 4px;
            padding: 6px 10px;
            margin-bottom: 12px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .gate-input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 36px 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }

        .gate-input:focus {
            border-color: var(--accent);
        }

        .toggle-pw {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            padding: 2px;
            cursor: pointer;
            color: var(--text-muted, #888);
            display: flex;
            align-items: center;
            opacity: 0.6;
            transition: opacity 0.15s;
        }

        .toggle-pw:hover {
            opacity: 1;
        }

        .gate-btn {
            width: 100%;
            padding: 8px;
            background: var(--accent);
            color: var(--btn-text, #fff);
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .gate-btn:hover {
            opacity: 0.85;
        }
    </style>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>
<body>

    <header>
        <a class="header-brand" href="/{{.Subpath}}">
            <div class="header-logo">🔒</div>
            <span>{{.Subpath}}</span>
        </a>
        <div class="header-right">
            <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Theme wechseln">🌙</button>
        </div>
    </header>

    <div class="container">
        <div class="gate-wrap">
            <div class="gate-card">
                <div class="gate-icon">🔒</div>
                <div class="gate-title">Password required</div>
                {{if .WrongPassword}}
                <div class="gate-error">Wrong password — try again.</div>
                {{end}}
                <form method="POST" action="/{{.Subpath}}/unlock">
                    <div class="input-wrap">
                        <input
                            class="gate-input"
                            type="password"
                            id="gate-pw"
                            name="password"
                            placeholder="Password"
                            autofocus
                        />
                        <button type="button" class="toggle-pw" onclick="togglePw()" tabindex="-1" aria-label="Passwort anzeigen">
                            <svg id="pw-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <button class="gate-btn" type="submit">Unlock</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const EYE     = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        const EYE_OFF = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

        function togglePw() {
            const input = document.getElementById('gate-pw');
            const btn   = input.nextElementSibling;
            const show  = input.type === 'password';
            input.type  = show ? 'text' : 'password';
            document.getElementById('pw-icon').innerHTML = show ? EYE_OFF : EYE;
            btn.setAttribute('aria-label', show ? 'Passwort verbergen' : 'Passwort anzeigen');
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeBtn();
        }

        function updateThemeBtn() {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        }

        updateThemeBtn();
    </script>

</body>
</html>
{{end}}
