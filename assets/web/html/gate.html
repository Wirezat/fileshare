<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Subpath}} — locked</title>
    <link rel="stylesheet" href="/static/share.css" />
    <style>
        .gate-wrap {
            display: flex;
            justify-content: center;
            padding: 80px 16px;
        }

        .gate-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px 28px;
            width: 100%;
            max-width: 340px;
        }

        .gate-icon {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .gate-title {
            font-family: var(--font-mono, monospace);
            font-size: 13px;
            color: var(--text);
            margin-bottom: 20px;
        }

        .gate-error {
            font-size: 12px;
            color: var(--danger, #e05555);
            background: rgba(224, 85, 85, 0.08);
            border: 1px solid rgba(224, 85, 85, 0.2);
            border-radius: 4px;
            padding: 6px 10px;
            margin-bottom: 12px;
        }

        .gate-input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 13px;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.15s;
        }

        .gate-input:focus {
            border-color: var(--accent);
        }

        .gate-btn {
            width: 100%;
            padding: 8px;
            background: var(--accent);
            color: var(--btn-text, #fff);
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .gate-btn:hover {
            opacity: 0.85;
        }
    </style>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body>

    <header>
        <a class="header-brand" href="/{{.Subpath}}">
            <div class="header-logo">🔒</div>
            <span>{{.Subpath}}</span>
        </a>
        <div class="header-right">
            <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <div class="container">
        <div class="gate-wrap">
            <div class="gate-card">
                <div class="gate-icon">🔒</div>
                <div class="gate-title">Password required</div>
                {{if .WrongPassword}}
                <div class="gate-error">Wrong password — try again.</div>
                {{end}}
                <form method="POST" action="/{{.Subpath}}/unlock">
                    <input
                        class="gate-input"
                        type="password"
                        name="password"
                        placeholder="Password"
                        autofocus
                    />
                    <button class="gate-btn" type="submit">Unlock</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
        }
        (function () {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        })();
    </script>

</body>

</html>
